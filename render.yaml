services:
  - type: web
    name: auracare-backend
    env: node
    region: ohio # You can change this to your preferred Render region
    plan: free # Uses Render's free tier
    rootDir: server # Points to the backend directory
    buildCommand: "npm install && npx prisma generate && npx prisma migrate deploy"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://auracare-coral.vercel.app
      - key: ACCESS_TOKEN_EXPIRY
        value: 16m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: REFRESH_TOKEN_EXPIRY_MS
        value: 604800000
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
